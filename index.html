<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <!-- Font self-hosted via @fontsource (GDPR: nessuna richiesta a Google,
       l'IP dell'utente non lascia più il nostro hosting a ogni apertura).
       Importati in src/main.jsx e serviti dal bundle. -->
  <meta name="theme-color" content="#15251C"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Fitsy"/>
  <title>Fitsy — Nutrizione intelligente</title>
  <meta name="description" content="Pianifica i pasti settimanali della famiglia: ricette stagionali, lista della spesa automatica, monitoraggio misure e idratazione."/>
  <link rel="manifest" href="/manifest.json"/>
</head>
<body>
<div id="root">
  <div id="boot-loader" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#ECF1E2;font-family:'Plus Jakarta Sans','Segoe UI',system-ui,sans-serif">
    <div style="text-align:center;color:#6E8576">
      <div style="width:56px;height:56px;border-radius:17px;background:#15251C;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
        <div style="position:relative;width:32px;height:32px">
          <svg width="32" height="32" viewBox="0 0 32 32" style="transform:rotate(-90deg);display:block;animation:spin 1.1s linear infinite"><circle cx="16" cy="16" r="12" fill="none" stroke="#28412f" stroke-width="4.5"/><circle cx="16" cy="16" r="12" fill="none" stroke="#C7F23E" stroke-width="4.5" stroke-linecap="round" stroke-dasharray="75.4" stroke-dashoffset="40"/></svg>
        </div>
      </div>
      <div style="font-size:14px;font-weight:600">Caricamento di Fitsy…</div>
    </div>
  </div>
</div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
