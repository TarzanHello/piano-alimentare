# Deploy automatico su GitHub Pages a ogni push su main
name: Deploy su GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # consente anche l'avvio manuale dalla tab Actions

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Primo tentativo: non blocca il job se fallisce (il backend Pages
      # ogni tanto risponde "Deployment failed, try again later" per
      # errori transitori pur avendo creato correttamente il deployment).
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      # Pausa e secondo tentativo solo se il primo è fallito
      - if: steps.deployment.outcome == 'failure'
        run: sleep 30
      - id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
